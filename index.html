<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gastos Gaby & Nico 🎮</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:#f3f0ff;min-height:100vh;}
.container{max-width:480px;margin:0 auto;padding:1rem;}
.screen{display:none;}
.screen.on{display:block;}

/* HOME */
.home-header{background:#7C3AED;border-radius:20px;padding:1.4rem;margin-bottom:1.2rem;position:relative;overflow:hidden;}
.home-header .deco{position:absolute;top:-10px;right:-10px;font-size:70px;opacity:.12;line-height:1;}
.home-header h1{font-size:22px;font-weight:900;color:#fff;}
.home-header p{font-size:13px;color:#C4B5FD;margin-top:3px;}
.months-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.month-card{border-radius:16px;padding:14px;cursor:pointer;border:2px solid transparent;transition:all .18s;position:relative;}
.month-card:hover{transform:translateY(-2px);}
.month-card.has-data{border-color:rgba(0,0,0,.12);}
.mc-emoji{font-size:26px;display:block;margin-bottom:5px;}
.mc-name{font-size:15px;font-weight:900;}
.mc-year{font-size:11px;font-weight:600;opacity:.6;margin-top:1px;}
.mc-badge{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.13);border-radius:20px;padding:2px 8px;font-size:10px;font-weight:800;}
.mc-total{font-size:12px;font-weight:700;margin-top:5px;opacity:.85;}

/* APP */
.back-btn{display:flex;align-items:center;gap:6px;background:#EDE9FE;border:none;border-radius:12px;padding:8px 14px;font-size:13px;font-weight:800;color:#5B21B6;cursor:pointer;font-family:'Nunito',sans-serif;margin-bottom:12px;}
.back-btn:hover{background:#DDD6FE;}
.hero{border-radius:20px;padding:1.2rem 1.4rem 1rem;margin-bottom:1rem;background:linear-gradient(135deg,#6D28D9,#7C3AED);position:relative;overflow:hidden;}
.hero-deco{position:absolute;top:-18px;right:-18px;font-size:80px;opacity:.13;line-height:1;}
.hero-title{font-size:20px;font-weight:900;color:#fff;}
.hero-sub{font-size:13px;color:rgba(255,255,255,.7);margin-top:2px;}
.hero-coins{display:flex;gap:8px;margin-top:12px;}
.coin-card{flex:1;background:rgba(255,255,255,.15);border-radius:14px;padding:10px 12px;}
.cc-lbl{font-size:11px;color:rgba(255,255,255,.75);font-weight:600;margin-bottom:2px;}
.cc-amt{font-size:18px;font-weight:900;color:#fff;}
.cc-sub{font-size:11px;color:rgba(255,255,255,.6);margin-top:1px;}
.cc-amt.pos{color:#6EE7B7!important;}
.cc-amt.neg{color:#FCA5A5!important;}
.duel{background:linear-gradient(135deg,#6366F1,#8B5CF6,#A78BFA);border-radius:16px;padding:12px 14px;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;}
.duel-txt{font-size:13px;color:#EDE9FE;font-weight:700;}
.duel-txt span{color:#fff;font-size:15px;}
.duel-amt{font-size:20px;font-weight:900;color:#FCD34D;}
.nav{display:flex;gap:6px;margin-bottom:1rem;}
.nav-btn{flex:1;padding:10px 6px;border:none;border-radius:14px;font-size:11px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;background:#EDE9FE;color:#5B21B6;}
.nav-btn.active{background:#7C3AED;color:#fff;transform:translateY(-2px);}
.nb-icon{font-size:17px;display:block;margin-bottom:2px;}
.panel{display:none;}
.panel.on{display:block;}
.form-panel,.chart-panel,.hist-panel,.cfg-panel{background:#F5F3FF;border-radius:20px;padding:1.2rem;margin-bottom:1rem;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:12px;font-weight:800;color:#5B21B6;}
.field label .op{color:#A78BFA;font-weight:600;}
.field input,.field select,.field textarea{padding:9px 11px;border:2px solid #C4B5FD;border-radius:12px;background:#fff;color:#1e1b4b;font-size:13px;font-family:'Nunito',sans-serif;font-weight:600;outline:none;transition:border .15s;}
.field textarea{resize:none;height:56px;line-height:1.5;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#7C3AED;}
.field-full{grid-column:1/-1;}
.btn-submit{width:100%;padding:13px;background:#7C3AED;color:#fff;border:none;border-radius:14px;font-size:14px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:4px;transition:all .15s;}
.btn-submit:hover{background:#6D28D9;transform:translateY(-1px);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#059669;color:#fff;font-size:13px;font-weight:800;padding:10px 24px;border-radius:30px;font-family:'Nunito',sans-serif;pointer-events:none;opacity:0;transition:all .3s;white-space:nowrap;z-index:999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;}
.cat-chip{border:2px solid transparent;border-radius:12px;padding:8px 4px;text-align:center;cursor:pointer;transition:all .15s;font-family:'Nunito',sans-serif;}
.cat-chip.sel{border-color:#7C3AED;transform:scale(1.06);}
.cc-emoji{font-size:22px;display:block;line-height:1.3;}
.cc-cimg{width:28px;height:28px;border-radius:50%;object-fit:cover;display:block;margin:0 auto;}
.cc-name{font-size:10px;font-weight:800;margin-top:3px;}
.chart-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;}
.ch-title{font-size:15px;font-weight:900;color:#4C1D95;}
.ch-total{font-size:12px;font-weight:700;color:#7C3AED;background:#EDE9FE;padding:4px 10px;border-radius:20px;}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.br-icon{width:24px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.br-icon img{width:20px;height:20px;border-radius:50%;object-fit:cover;}
.br-label{font-size:12px;font-weight:700;color:#4C1D95;width:76px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.br-track{flex:1;height:20px;background:#DDD6FE;border-radius:30px;overflow:hidden;}
.br-fill{height:100%;border-radius:30px;transition:width .5s cubic-bezier(.34,1.56,.64,1);}
.br-val{font-size:11px;font-weight:800;color:#4C1D95;min-width:50px;text-align:right;flex-shrink:0;}
.br-pct{font-size:11px;font-weight:700;color:#8B5CF6;min-width:26px;text-align:right;flex-shrink:0;}
.no-data{text-align:center;padding:1.5rem 0;font-size:13px;font-weight:700;color:#A78BFA;}
.ms-row{display:flex;gap:8px;margin-bottom:12px;}
.ms-card{flex:1;background:#fff;border-radius:12px;padding:8px 10px;border:2px solid #EDE9FE;}
.msc-lbl{font-size:10px;font-weight:800;color:#A78BFA;margin-bottom:2px;}
.msc-val{font-size:14px;font-weight:900;color:#4C1D95;}
.exp-list{display:flex;flex-direction:column;gap:7px;}
.exp-card{background:#fff;border-radius:14px;padding:11px;display:flex;align-items:flex-start;gap:9px;border:2px solid #EDE9FE;transition:border-color .15s;}
.exp-card:hover{border-color:#C4B5FD;}
.ec-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden;}
.ec-icon img{width:100%;height:100%;object-fit:cover;border-radius:12px;}
.ec-body{flex:1;min-width:0;}
.ec-name{font-size:13px;font-weight:800;color:#1e1b4b;}
.ec-meta{font-size:11px;font-weight:600;color:#8B5CF6;margin-top:1px;}
.ec-note{font-size:11px;font-weight:600;color:#6D28D9;margin-top:3px;font-style:italic;}
.ec-right{text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;}
.ec-amt{font-size:14px;font-weight:900;color:#4C1D95;}
.ec-who{font-size:10px;font-weight:700;color:#8B5CF6;margin-top:1px;}
.btn-del{background:none;border:2px solid #EDE9FE;color:#C4B5FD;cursor:pointer;padding:3px 7px;font-size:14px;border-radius:8px;margin-top:5px;transition:all .15s;}
.btn-del:hover{color:#EF4444;border-color:#FCA5A5;background:#FEF2F2;}
.empty-state{text-align:center;padding:2rem 0;font-size:13px;font-weight:700;color:#A78BFA;}
.avatar-row{display:flex;gap:12px;align-items:center;margin-bottom:14px;}
.avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;flex-shrink:0;}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
</style>
</head>
<body>
<div class="container">

<div class="screen on" id="screen-home">
  <div class="home-header">
    <div class="deco">📅</div>
    <h1>Gastos 2026 🎮</h1>
    <p id="home-names">Gabriela & Nicolás · Elige un mes</p>
  </div>
  <div class="months-grid" id="months-grid"></div>
</div>

<div class="screen" id="screen-app">
  <button class="back-btn" onclick="goHome()">← Volver a 2026</button>
  <div class="hero">
    <div class="hero-deco">💰</div>
    <div class="hero-title" id="hero-title">Gaby & Nico 🎮</div>
    <div class="hero-sub" id="hero-sub">Mes</div>
    <div class="hero-coins">
      <div class="coin-card"><div class="cc-lbl" id="p1-lbl">Gabriela</div><div class="cc-amt" id="p1-bal">$0</div><div class="cc-sub" id="p1-paid">Pagado $0</div></div>
      <div class="coin-card"><div class="cc-lbl" id="p2-lbl">Nicolás</div><div class="cc-amt" id="p2-bal">$0</div><div class="cc-sub" id="p2-paid">Pagado $0</div></div>
    </div>
  </div>
  <div class="duel"><div class="duel-txt" id="duel-txt">¡Sin gastos todavía!</div><div class="duel-amt" id="duel-amt"></div></div>
  <div class="nav">
    <button class="nav-btn active" onclick="showPanel('add')" id="nb-add"><span class="nb-icon">➕</span>Agregar</button>
    <button class="nav-btn" onclick="showPanel('chart')" id="nb-chart"><span class="nb-icon">📊</span>Gráfico</button>
    <button class="nav-btn" onclick="showPanel('hist')" id="nb-hist"><span class="nb-icon">📜</span>Historial</button>
    <button class="nav-btn" onclick="showPanel('cfg')" id="nb-cfg"><span class="nb-icon">⚙️</span>Nombres</button>
  </div>
  <div class="toast" id="toast"></div>

  <div class="panel on" id="panel-add">
    <div class="form-panel">
      <div class="field-row"><div class="field field-full"><label>¿Qué compraron?</label><input type="text" id="desc" placeholder="ej. Supermercado, veterinario..."/></div></div>
      <div class="field-row">
        <div class="field"><label>Monto ($)</label><input type="number" id="amount" placeholder="0" min="0" step="1"/></div>
        <div class="field"><label>¿Quién pagó?</label><select id="paid-by"><option value="p1">Gabriela</option><option value="p2">Nicolás</option></select></div>
      </div>
      <div class="field" style="margin-bottom:10px;"><label>Categoría</label><div class="cat-grid" id="cat-grid"></div></div>
      <div class="field-row"><div class="field field-full"><label>Nota <span class="op">(opcional)</span></label><textarea id="note" placeholder="ej. Control de Roma, bencina..."></textarea></div></div>
      <button class="btn-submit" onclick="addExpense()">¡Registrar gasto! 🚀</button>
    </div>
  </div>

  <div class="panel" id="panel-chart">
    <div class="chart-panel">
      <div class="chart-head"><span class="ch-title">Ranking del mes 🏆</span><span class="ch-total" id="chart-total">Total $0</span></div>
      <div id="bars"></div>
    </div>
  </div>

  <div class="panel" id="panel-hist">
    <div class="hist-panel">
      <div class="ms-row" id="ms-row" style="display:none;">
        <div class="ms-card"><div class="msc-lbl">Gastos</div><div class="msc-val" id="ms-count">0</div></div>
        <div class="ms-card"><div class="msc-lbl">Total</div><div class="msc-val" id="ms-total">$0</div></div>
        <div class="ms-card"><div class="msc-lbl">Pagó más</div><div class="msc-val" id="ms-who">—</div></div>
      </div>
      <div class="exp-list" id="hist-list"></div>
    </div>
  </div>

  <div class="panel" id="panel-cfg">
    <div class="cfg-panel">
      <div style="font-size:15px;font-weight:900;color:#4C1D95;margin-bottom:12px;">Personalizar jugadores 🎮</div>
      <div class="avatar-row"><div class="avatar" style="background:#7C3AED;" id="av1">G</div><div class="field" style="flex:1;"><label>Tu nombre</label><input type="text" id="name-p1" value="Gabriela"/></div></div>
      <div class="avatar-row"><div class="avatar" style="background:#0891B2;" id="av2">N</div><div class="field" style="flex:1;"><label>Nombre de tu pareja</label><input type="text" id="name-p2" value="Nicolás"/></div></div>
      <button class="btn-submit" onclick="saveNames()">Guardar jugadores 💾</button>
    </div>
  </div>
</div>

</div>

  {key:'2026-01',name:'Enero',emoji:'❄️',bg:'#EFF6FF',tc:'#1D4ED8'},
  {key:'2026-02',name:'Febrero',emoji:'💕',bg:'#FDF2F8',tc:'#9D174D'},

let names={p1:'Gabriela',p2:'Nicolás'}, currentMonth=null, expenses=[], selCat='comida';

function chipHTML(cat){
  const thumb=cat.img?`<img src="${cat.img}" class="cc-cimg" alt="${cat.name}">`:`<span class="cc-emoji">${cat.emoji}</span>`;
  return `${thumb}<span class="cc-name" style="color:${cat.bc};">${cat.name}</span>`;
}
function barIconHTML(cat){
  if(cat.img) return `<img src="${cat.img}" style="width:20px;height:20px;border-radius:50%;object-fit:cover;" alt="${cat.name}">`;
  return `<span style="font-size:17px;">${cat.emoji}</span>`;
}
function histIconHTML(cat){
  if(cat.img) return `<img src="${cat.img}" style="width:100%;height:100%;object-fit:cover;border-radius:12px;" alt="${cat.name}">`;
  return cat.emoji;
}
function buildCatGrid(){
  document.getElementById('cat-grid').innerHTML=CATS.map(c=>`<div class="cat-chip${c.id===selCat?' sel':''}" style="background:${c.bg};" onclick="selCategory('${c.id}')">${chipHTML(c)}</div>`).join('');
}
function selCategory(id){selCat=id;buildCatGrid();}

function loadNames(){
  try{const d=localStorage.getItem('gastos_names');if(d)names=JSON.parse(d);}catch(e){}
}
function loadExp(mk){
  try{const d=localStorage.getItem('gastos_month_'+mk);if(d)return JSON.parse(d);}catch(e){}
  return[];
}
function saveExp(mk,data){localStorage.setItem('gastos_month_'+mk,JSON.stringify(data));}
function getTotal(mk){return loadExp(mk).reduce((s,e)=>s+e.amount,0);}

function buildHome(){
  loadNames();
  document.getElementById('home-names').textContent=`${names.p1} & ${names.p2} · Elige un mes`;
  const now=new Date();
  const curKey=`2026-${String(now.getMonth()+1).padStart(2,'0')}`;
  document.getElementById('months-grid').innerHTML=MONTHS.map(m=>{
    const tot=getTotal(m.key);
    const isCur=m.key===curKey;
    return `<div class="month-card${tot>0?' has-data':''}" style="background:${m.bg};" onclick="enterMonth('${m.key}')">
      ${isCur?`<div class="mc-badge" style="color:${m.tc};">Hoy</div>`:''}
      <span class="mc-emoji">${m.emoji}</span>
      <div class="mc-name" style="color:${m.tc};">${m.name}</div>
      <div class="mc-year" style="color:${m.tc};">2026</div>
      ${tot>0?`<div class="mc-total" style="color:${m.tc};">$${Math.round(tot).toLocaleString('es-CL')}</div>`:''}
    </div>`;
  }).join('');
}

function enterMonth(mk){
  currentMonth=mk; selCat='comida';
  expenses=loadExp(mk);
  const m=MONTHS.find(x=>x.key===mk);
  document.getElementById('hero-sub').textContent=`${m.name} 2026 · 50/50`;
  applyNames(); buildCatGrid(); render(); showPanel('add');
  document.getElementById('screen-home').className='screen';
  document.getElementById('screen-app').className='screen on';
  window.scrollTo(0,0);
}
function goHome(){
  document.getElementById('screen-app').className='screen';
  document.getElementById('screen-home').className='screen on';
  buildHome();
  window.scrollTo(0,0);
}
function applyNames(){
  document.getElementById('p1-lbl').textContent=names.p1;
  document.getElementById('p2-lbl').textContent=names.p2;
  document.getElementById('hero-title').textContent=names.p1.slice(0,5)+' & '+names.p2.slice(0,4)+' ❤️';
  document.getElementById('paid-by').options[0].text=names.p1;
  document.getElementById('paid-by').options[1].text=names.p2;
  document.getElementById('name-p1').value=names.p1;
  document.getElementById('name-p2').value=names.p2;
  document.getElementById('av1').textContent=names.p1[0].toUpperCase();
  document.getElementById('av2').textContent=names.p2[0].toUpperCase();
}
function fmt(n){return'$'+Math.round(Math.abs(n)).toLocaleString('es-CL');}
function render(){
  let p1=0,p2=0;
  expenses.forEach(e=>{if(e.paidBy==='p1')p1+=e.amount;else p2+=e.amount;});
  const tot=p1+p2,each=tot/2,b1=p1-each,b2=p2-each;
  document.getElementById('p1-paid').textContent='Pagado '+fmt(p1);
  document.getElementById('p2-paid').textContent='Pagado '+fmt(p2);
  const setB=(id,v)=>{const el=document.getElementById(id);
    if(v>0.5){el.className='cc-amt pos';el.textContent='+'+fmt(v);}
    else if(v<-0.5){el.className='cc-amt neg';el.textContent='-'+fmt(v);}
    else{el.className='cc-amt';el.textContent='$0';}};
  setB('p1-bal',b1);setB('p2-bal',b2);
  const dt=document.getElementById('duel-txt'),da=document.getElementById('duel-amt');
  if(tot===0){dt.innerHTML='¡Sin gastos este mes! 🎯';da.textContent='';}
  else if(Math.abs(b1)<1){dt.innerHTML='<span>¡Estamos a mano!</span> 🤝';da.textContent='';}
  else if(b1<0){dt.innerHTML=`<span>${names.p1}</span> le debe a <span>${names.p2}</span> 💸`;da.textContent=fmt(Math.abs(b1));}
  else{dt.innerHTML=`<span>${names.p2}</span> le debe a <span>${names.p1}</span> 💸`;da.textContent=fmt(Math.abs(b2));}
  renderChart(); renderHist();
}
function renderChart(){
  const totals={};let grand=0;
  expenses.forEach(e=>{totals[e.category]=(totals[e.category]||0)+e.amount;grand+=e.amount;});
  document.getElementById('chart-total').textContent='Total '+fmt(grand);
  const barsEl=document.getElementById('bars');
  const cats=CATS.filter(c=>totals[c.id]).sort((a,b)=>totals[b.id]-totals[a.id]);
  if(!cats.length){barsEl.innerHTML='<div class="no-data">🎯 Agrega gastos para ver el ranking</div>';return;}
  const max=Math.max(...cats.map(c=>totals[c.id]));
  barsEl.innerHTML=cats.map((c,i)=>{
    const v=totals[c.id],pct=Math.round(v/grand*100),w=Math.round(v/max*100);
    return `<div class="bar-row"><div class="br-icon">${barIconHTML(c)}</div><div class="br-label">${c.name}</div><div class="br-track"><div class="br-fill" style="width:${w}%;background:${BAR_FILLS[i%BAR_FILLS.length]};"></div></div><div class="br-val">${fmt(v)}</div><div class="br-pct">${pct}%</div></div>`;
  }).join('');
}
function renderHist(){
  const msRow=document.getElementById('ms-row');
  if(expenses.length){
    msRow.style.display='flex';
    const tot=expenses.reduce((s,e)=>s+e.amount,0);
    const p1m=expenses.filter(e=>e.paidBy==='p1').reduce((s,e)=>s+e.amount,0);
    document.getElementById('ms-count').textContent=expenses.length;
    document.getElementById('ms-total').textContent=fmt(tot);
    document.getElementById('ms-who').textContent=p1m>=(tot-p1m)?names.p1:names.p2;
  }else{msRow.style.display='none';}
  const list=document.getElementById('hist-list');
  if(!expenses.length){list.innerHTML='<div class="empty-state">¡Sin gastos este mes! 🚀</div>';return;}
  list.innerHTML=[...expenses].reverse().map((e,ri)=>{
    const idx=expenses.length-1-ri;
    const cat=CATS.find(c=>c.id===e.category)||CATS[CATS.length-1];
    const pName=e.paidBy==='p1'?names.p1:names.p2;
    const eachAmt=Math.round(e.amount/2).toLocaleString('es-CL');
    return `<div class="exp-card"><div class="ec-icon" style="background:${cat.bg};">${histIconHTML(cat)}</div><div class="ec-body"><div class="ec-name">${e.desc}</div><div class="ec-meta">${cat.name} · ${e.date}</div>${e.note?`<div class="ec-note">📝 ${e.note}</div>`:''}</div><div class="ec-right"><div class="ec-amt">${fmt(e.amount)}</div><div class="ec-who">Pagó ${pName} · $${eachAmt} c/u</div><button class="btn-del" onclick="delExpense(${idx})">🗑️</button></div></div>`;
  }).join('');
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}
function addExpense(){
  const desc=document.getElementById('desc').value.trim();
  const amount=parseFloat(document.getElementById('amount').value);
  const paidBy=document.getElementById('paid-by').value;
  const note=document.getElementById('note').value.trim();
  if(!desc||isNaN(amount)||amount<=0){showToast('⚠️ Falta descripción o monto');return;}
  const now=new Date();
  const date=now.toLocaleDateString('es-CL',{day:'numeric',month:'short'});
  expenses.push({desc,amount,paidBy,category:selCat,date,note});
  saveExp(currentMonth,expenses);
  document.getElementById('desc').value='';
  document.getElementById('amount').value='';
  document.getElementById('note').value='';
  showToast(selCat==='roma'?'¡Gasto de Roma! 🐾':selCat==='ramsito'?'¡Gasto de Ramsito! 🚗':'¡Gasto registrado! 🎉');
  render();
}
function delExpense(i){
  if(!confirm('¿Eliminar este gasto?'))return;
  expenses.splice(i,1);
  saveExp(currentMonth,expenses);
  render();
}
function saveNames(){
  const p1=document.getElementById('name-p1').value.trim()||'Gabriela';
  const p2=document.getElementById('name-p2').value.trim()||'Nicolás';
  names={p1,p2};
  localStorage.setItem('gastos_names',JSON.stringify(names));
  applyNames();render();showToast('¡Jugadores guardados! 🎮');showPanel('add');
}
function showPanel(p){
  ['add','chart','hist','cfg'].forEach(x=>{
    document.getElementById('panel-'+x).className='panel'+(x===p?' on':'');
    document.getElementById('nb-'+x).className='nav-btn'+(x===p?' active':'');
  });
}
buildHome();
</script>
</body>
</html>
